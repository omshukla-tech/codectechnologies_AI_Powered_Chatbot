<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assist — Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ================================================================
           Admin Dashboard Styles — Extends the main theme
           ================================================================ */
        :root {
            --bg-primary: #0a0b0f;
            --bg-secondary: #111318;
            --bg-tertiary: #1a1d26;
            --bg-glass: rgba(26, 29, 38, 0.6);
            --bg-glass-hover: rgba(26, 29, 38, 0.8);
            --text-primary: #e8eaf0;
            --text-secondary: #8b8fa3;
            --text-muted: #5a5e72;
            --accent-primary: #7c3aed;
            --accent-secondary: #8b5cf6;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --neon-purple: #a78bfa;
            --neon-cyan: #22d3ee;
            --neon-pink: #f472b6;
            --border-color: rgba(255, 255, 255, 0.06);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --transition-fast: 150ms ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Background */
        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 500px; height: 500px;
            background: var(--neon-purple);
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header__left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header__logo {
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: var(--radius-sm);
            color: white;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .header__title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header__subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .header__actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-fast);
        }
        .btn:hover {
            background: var(--bg-glass-hover);
            border-color: rgba(167, 139, 250, 0.3);
        }
        .btn--primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        .btn--primary:hover {
            background: var(--accent-secondary);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: all var(--transition-fast);
        }
        .stat-card:hover {
            border-color: rgba(167, 139, 250, 0.2);
            transform: translateY(-2px);
        }

        .stat-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-card__label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-card__icon {
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            color: var(--neon-purple);
        }

        .stat-card__value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--text-primary), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card__change {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Panels */
        .panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .panel__title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .panel__subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Activity Graph */
        .graph {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 200px;
            padding-top: 16px;
        }

        .graph__bar {
            flex: 1;
            border-radius: 4px 4px 0 0;
            background: linear-gradient(to top, var(--accent-primary), var(--neon-purple));
            min-height: 4px;
            transition: all var(--transition-fast);
            position: relative;
            opacity: 0.8;
        }
        .graph__bar:hover {
            opacity: 1;
            transform: scaleY(1.02);
            transform-origin: bottom;
        }

        .graph__bar-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .graph__bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--neon-cyan);
            font-weight: 600;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .graph__bar:hover .graph__bar-value {
            opacity: 1;
        }

        /* Most Asked List */
        .faq-list {
            list-style: none;
        }

        .faq-list__item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }
        .faq-list__item:last-child {
            border-bottom: none;
        }

        .faq-list__rank {
            width: 24px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .faq-list__question {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .faq-list__count {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--neon-cyan);
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state__icon {
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* Loading shimmer */
        .shimmer {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Status indicator */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .status__dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .container { padding: 20px 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stat-card__value { font-size: 1.5rem; }
            .graph { height: 140px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header__left">
                <div class="header__logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a10 10 0 0 1 10 10c0 2.5-1 4.8-2.6 6.5L21 21l-2.5-.6A10 10 0 1 1 12 2z"/>
                        <path d="M8 12h8M12 8v8"/>
                    </svg>
                </div>
                <div>
                    <h1 class="header__title">Analytics Dashboard</h1>
                    <p class="header__subtitle">AI Assist — Real-time Chatbot Metrics</p>
                </div>
            </div>
            <div class="header__actions">
                <span class="status"><span class="status__dot"></span> Live</span>
                <a href="/" class="btn">← Back to Chat</a>
                <button class="btn btn--primary" id="refreshBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-card__header">
                    <span class="stat-card__label">Total Users</span>
                    <div class="stat-card__icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                </div>
                <div class="stat-card__value" id="totalUsers">—</div>
            </div>

            <div class="stat-card">
                <div class="stat-card__header">
                    <span class="stat-card__label">Total Messages</span>
                    <div class="stat-card__icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                </div>
                <div class="stat-card__value" id="totalMessages">—</div>
            </div>

            <div class="stat-card">
                <div class="stat-card__header">
                    <span class="stat-card__label">Avg. Messages/User</span>
                    <div class="stat-card__icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="12" x2="2" y2="12"/><path d="M12 2v20"/></svg>
                    </div>
                </div>
                <div class="stat-card__value" id="avgMessages">—</div>
            </div>

            <div class="stat-card">
                <div class="stat-card__header">
                    <span class="stat-card__label">Active Days</span>
                    <div class="stat-card__icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                </div>
                <div class="stat-card__value" id="activeDays">—</div>
            </div>
        </div>

        <!-- Activity Graph -->
        <div class="panel">
            <div class="panel__header">
                <div>
                    <h2 class="panel__title">Chat Activity (Last 7 Days)</h2>
                    <p class="panel__subtitle">Daily message volume</p>
                </div>
            </div>
            <div class="graph" id="activityGraph">
                <div class="empty-state" id="graphEmpty">
                    <div class="empty-state__icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </div>
                    <p>No activity data yet</p>
                </div>
            </div>
        </div>

        <!-- Most Asked Questions -->
        <div class="panel">
            <div class="panel__header">
                <div>
                    <h2 class="panel__title">Most Asked Questions</h2>
                    <p class="panel__subtitle">Frequently asked user queries</p>
                </div>
            </div>
            <ul class="faq-list" id="faqList">
                <li class="empty-state" id="faqEmpty">
                    <div class="empty-state__icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    </div>
                    <p>No questions asked yet</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const BASE = '/api/admin/stats';
        const refreshBtn = document.getElementById('refreshBtn');

        async function loadStats() {
            try {
                const res = await fetch(BASE);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                // Update stat cards
                document.getElementById('totalUsers').textContent = data.total_users ?? 0;
                document.getElementById('totalMessages').textContent = data.total_messages ?? 0;
                const avg = data.total_users > 0
                    ? (data.total_messages / data.total_users).toFixed(1)
                    : '0';
                document.getElementById('avgMessages').textContent = avg;
                document.getElementById('activeDays').textContent = (data.activity || []).length + ' days';

                // Update graph
                renderGraph(data.activity || []);
                renderFAQ(data.most_asked || []);
            } catch (err) {
                console.error('Failed to load stats:', err);
                // Show error state
            }
        }

        function renderGraph(activity) {
            const container = document.getElementById('activityGraph');
            const empty = document.getElementById('graphEmpty');

            if (!activity.length) {
                container.innerHTML = '';
                container.appendChild(empty);
                return;
            }

            const maxCount = Math.max(...activity.map(a => a.count), 1);
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            container.innerHTML = '';
            activity.forEach((item) => {
                const pct = (item.count / maxCount) * 100;
                const bar = document.createElement('div');
                bar.className = 'graph__bar';
                bar.style.height = Math.max(pct, 4) + '%';

                // Date label
                const d = new Date(item.date + 'T00:00:00');
                const label = document.createElement('span');
                label.className = 'graph__bar-label';
                label.textContent = days[d.getDay()] || item.date.slice(5);

                const value = document.createElement('span');
                value.className = 'graph__bar-value';
                value.textContent = item.count;

                bar.appendChild(value);
                bar.appendChild(label);
                container.appendChild(bar);
            });
        }

        function renderFAQ(faq) {
            const list = document.getElementById('faqList');
            const empty = document.getElementById('faqEmpty');

            if (!faq.length) {
                list.innerHTML = '';
                list.appendChild(empty);
                return;
            }

            list.innerHTML = '';
            faq.forEach(([question, count], idx) => {
                const li = document.createElement('li');
                li.className = 'faq-list__item';

                const rank = document.createElement('span');
                rank.className = 'faq-list__rank';
                rank.textContent = '#' + (idx + 1);

                const q = document.createElement('span');
                q.className = 'faq-list__question';
                q.textContent = question.length > 60 ? question.slice(0, 57) + '...' : question;

                const c = document.createElement('span');
                c.className = 'faq-list__count';
                c.textContent = count + 'x';

                li.appendChild(rank);
                li.appendChild(q);
                li.appendChild(c);
                list.appendChild(li);
            });
        }

        // Auto-refresh every 30s
        loadStats();
        refreshBtn.addEventListener('click', loadStats);
        setInterval(loadStats, 30000);
    })();
    </script>
</body>
</html>
